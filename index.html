<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 600px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .header {
            background: #4a5568;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
        }
        
        .user-message .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message .message-bubble {
            background: white;
            color: #2d3748;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-bubble strong {
            font-weight: 700;
        }
        
        .message-bubble code {
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        
        .message-bubble pre {
            background: #2d3748;
            color: #68d391;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .input-container {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
        }
        
        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .input-container input:focus {
            border-color: #667eea;
        }
        
        .input-container button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .typing-indicator {
            background: white;
            padding: 12px 16px;
            border-radius: 20px;
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #cbd5e0;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #48bb78;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
        }
        
        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: white;
            z-index: 201;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-header {
            padding: 20px;
            background: #4a5568;
            color: white;
        }
        
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f7fafc;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .chat-item.active {
            background: #667eea;
            color: white;
        }
        
        .delete-chat {
            float: right;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <h1>🤖 AI Chatbot</h1>
            <div style="width: 44px;"></div>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot-message">
                <div class="message-bubble">
                    👋 <strong>Hi there!</strong> I'm your AI assistant!<br><br>
                    Tap ☰ to manage multiple conversations. Ask me anything! 🚀
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>💬 Conversations</h3>
            <button class="new-chat-btn" onclick="createNewChat()">➕ New Chat</button>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>

    <script>
        // The API key is NOT here! It's on the server!
        
        let chats = {};
        let currentChatId = null;
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function formatText(text) {
            if (!text) return '';
            let formatted = text;
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function loadChats() {
            const saved = localStorage.getItem('chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                const defaultId = 'chat_' + Date.now();
                chats[defaultId] = {
                    id: defaultId,
                    name: 'Chat 1',
                    messages: [{ text: "👋 Hi! I'm your AI assistant. Ask me anything!", sender: 'bot', timestamp: new Date().toISOString() }],
                    updatedAt: new Date().toISOString()
                };
                currentChatId = defaultId;
                saveChats();
            }
            if (!currentChatId || !chats[currentChatId]) {
                currentChatId = Object.keys(chats)[0];
            }
            renderChatsList();
            loadCurrentChat();
        }
        
        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }
        
        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            Object.values(chats).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.onclick = () => { switchToChat(chat.id); toggleSidebar(); };
                div.innerHTML = `
                    <div><strong>${escapeHtml(chat.name)}</strong></div>
                    <small>${new Date(chat.updatedAt).toLocaleDateString()}</small>
                    <button class="delete-chat" onclick="event.stopPropagation(); deleteChat('${chat.id}')">🗑️</button>
                `;
                container.appendChild(div);
            });
        }
        
        function loadCurrentChat() {
            if (!currentChatId || !chats[currentChatId]) return;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            chats[currentChatId].messages.forEach(msg => {
                addMessageToDisplay(msg.text, msg.sender);
            });
        }
        
        function addMessageToDisplay(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = sender === 'bot' ? formatText(text) : escapeHtml(text).replace(/\n/g, '<br>');
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addMessageToChat(text, sender) {
            if (!currentChatId || !chats[currentChatId]) return;
            chats[currentChatId].messages.push({ text, sender, timestamp: new Date().toISOString() });
            chats[currentChatId].updatedAt = new Date().toISOString();
            saveChats();
            addMessageToDisplay(text, sender);
            renderChatsList();
        }
        
        function switchToChat(chatId) {
            if (!chats[chatId]) return;
            currentChatId = chatId;
            loadCurrentChat();
            renderChatsList();
        }
        
        function createNewChat() {
            const newId = 'chat_' + Date.now();
            chats[newId] = {
                id: newId,
                name: `Chat ${Object.keys(chats).length + 1}`,
                messages: [{ text: "✨ New conversation started! What would you like to talk about?", sender: 'bot', timestamp: new Date().toISOString() }],
                updatedAt: new Date().toISOString()
            };
            saveChats();
            currentChatId = newId;
            loadCurrentChat();
            renderChatsList();
            toggleSidebar();
        }
        
        function deleteChat(chatId) {
            if (Object.keys(chats).length === 1) {
                showToast('Cannot delete the only chat');
                return;
            }
            delete chats[chatId];
            if (currentChatId === chatId) {
                currentChatId = Object.keys(chats)[0];
            }
            saveChats();
            renderChatsList();
            loadCurrentChat();
        }
        
        // Send message - calls our hidden API endpoint
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessageToChat(message, 'user');
            input.value = '';
            
            const sendBtn = document.querySelector('.input-container button');
            sendBtn.disabled = true;
            
            // Show typing indicator
            const messagesDiv = document.getElementById('messages');
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'message bot-message';
            typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                // Call our serverless function instead of Groq directly
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: chats[currentChatId].messages.slice(-15)
                    })
                });
                
                const data = await response.json();
                document.getElementById(typingId)?.remove();
                
                if (data.error) throw new Error(data.error);
                
                addMessageToChat(data.reply, 'bot');
                
            } catch (error) {
                document.getElementById(typingId)?.remove();
                addMessageToChat(`❌ Error: ${error.message}`, 'bot');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
        
        loadChats();
    </script>
</body>
</html>
